[[nodes]]
name       = "node01"
host       = "node01"
user       = "appuser"
ssh_key    = "~/.ssh/id_ed25519"
remote_path = "/etc/containers/systemd"
local_path = "node01"
tags       = ["gateway", "database"]

  [[nodes.quadlets]]
  name = "parent-container"
  file = "parent.container"
  depends_on = ["parent-network", "parent-volume"]

  [[nodes.quadlets]]
  name = "parent-network"
  file = "parent.network"

  [[nodes.quadlets]]
  name = "parent-volume"
  file = "parent.volume"
